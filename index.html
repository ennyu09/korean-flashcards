<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도장깨기 · 韩语单词闪卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF2ED;
    --paper-2:#E1E8E1;
    --ink:#232323;
    --ink-soft:#5c574f;
    --indigo:#2F4468;
    --ochre:#C08A2E;
    --ochre-dark:#8a5c17;
    --seal:#B23A2E;
    --seal-dark:#8f2a20;
    --neutral:#8a8377;
    --neutral-dark:#4a4038;
    --white:#fffdf8;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(47,68,104,0.06), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(178,58,46,0.05), transparent 40%),
      var(--paper);
    font-family:'Noto Sans SC', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px 14px 40px;
  }
  .app{
    width:100%;
    max-width:420px;
  }

  /* header */
  .app-header{
    text-align:center;
    margin-bottom:18px;
  }
  .app-title{
    font-family:'Song Myung', serif;
    font-size:26px;
    letter-spacing:1px;
    color:var(--ink);
    margin:0;
  }
  .app-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:4px 0 0;
    letter-spacing:.2px;
  }

  /* session bar */
  .session-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12.5px;
    color:var(--ink-soft);
    margin:18px 2px 6px;
    font-family:'JetBrains Mono', monospace;
  }
  .stats-bar{
    display:flex;
    height:8px;
    width:100%;
    border-radius:5px;
    overflow:hidden;
    background:var(--paper-2);
    margin-bottom:22px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);
  }
  .stats-bar span{height:100%;transition:flex-basis .4s ease;}
  .seg-0{background:var(--neutral);}
  .seg-1{background:var(--ochre);}
  .seg-2{background:var(--indigo);}
  .seg-3{background:var(--seal);}

  .banner{
    background:var(--white);
    border:1px solid rgba(0,0,0,0.06);
    border-radius:14px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    text-align:center;
    margin-bottom:16px;
    line-height:1.5;
  }

  /* card */
  .card-wrap{
    perspective:1400px;
    margin-bottom:8px;
  }
  .card{
    position:relative;
    width:100%;
    aspect-ratio:3/4;
    cursor:pointer;
  }
  .card-inner{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.34,1.1,.64,1);
  }
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .card-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:var(--radius);
    background:var(--white);
    box-shadow:0 2px 4px rgba(35,30,20,0.04), 0 12px 30px rgba(35,30,20,0.10);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 22px;
    text-align:center;
  }
  .card-back{transform:rotateY(180deg);}

  .level-badge{
    position:absolute;
    top:14px;
    right:14px;
    width:30px;
    height:30px;
    border-radius:48% 52% 47% 53%/53% 47% 53% 47%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Song Myung', serif;
    font-size:15px;
    color:var(--white);
    opacity:.9;
  }

  .kr-word{
    font-family:'Song Myung', serif;
    font-size:44px;
    line-height:1.25;
    color:var(--ink);
    margin:0 0 10px;
    word-break:keep-all;
  }
  .romanization{
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    color:var(--ink-soft);
    letter-spacing:.3px;
    margin-bottom:14px;
  }
  .speak-btn{
    border:1px solid rgba(0,0,0,0.1);
    background:var(--paper);
    color:var(--ink-soft);
    border-radius:999px;
    padding:7px 16px;
    font-size:13px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .speak-btn:hover{background:var(--paper-2);}
  .flip-hint{
    position:absolute;
    bottom:16px;
    font-size:12px;
    color:var(--ink-soft);
    opacity:.6;
  }

  .meaning{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:24px;
    color:var(--ink);
    margin:2px 0 14px;
  }
  .example-block{
    background:var(--paper);
    border-radius:12px;
    padding:12px 14px;
    width:100%;
  }
  .example-kr-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    margin-bottom:4px;
  }
  .example-kr{
    font-size:14.5px;
    color:var(--ink);
    margin:0;
    line-height:1.5;
    text-align:left;
  }
  .example-speak-btn{
    flex:0 0 auto;
    border:none;
    background:none;
    color:var(--ink-soft);
    font-size:14px;
    cursor:pointer;
    padding:0 0 0 4px;
    line-height:1.5;
  }
  .example-speak-btn:hover{color:var(--ink);}
  .example-zh{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:0;
    line-height:1.5;
  }

  /* stamp overlay */
  .stamp-layer{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    z-index:5;
  }
  .stamp{
    width:110px;
    height:110px;
    border-radius:46% 54% 49% 51%/52% 48% 53% 47%;
    border:4px solid currentColor;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Song Myung', serif;
    font-size:48px;
    transform:rotate(-9deg) scale(0.4);
    opacity:0;
    animation:stampIn .6s cubic-bezier(.2,1.4,.5,1) forwards;
    box-shadow:0 0 0 3px rgba(255,255,255,0.0);
  }
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-9deg) scale(2.2);}
    55%{opacity:1; transform:rotate(-9deg) scale(0.85);}
    75%{opacity:1; transform:rotate(-9deg) scale(1.05);}
    100%{opacity:1; transform:rotate(-9deg) scale(1);}
  }

  /* rating buttons */
  .ratings{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
  }
  .rate-btn{
    border:none;
    border-radius:14px;
    padding:12px 10px;
    color:var(--white);
    cursor:pointer;
    text-align:left;
    font-family:'Noto Sans SC', sans-serif;
    transition:transform .12s ease, opacity .2s ease;
  }
  .rate-btn:active{transform:scale(0.97);}
  .rate-btn:disabled{opacity:.35; cursor:not-allowed;}
  .rate-btn .kr{
    display:block;
    font-family:'Noto Sans KR', sans-serif;
    font-size:13.5px;
    font-weight:700;
  }
  .rate-btn .zh{
    display:block;
    font-size:11.5px;
    opacity:.9;
    margin-top:2px;
  }
  .r0{background:var(--neutral-dark);}
  .r1{background:var(--ochre-dark);}
  .r2{background:var(--indigo);}
  .r3{background:var(--seal-dark);}

  .footer-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:22px;
  }
  .reset-link{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    padding:6px;
  }

  .settings-panel{
    background:var(--white);
    border:1px solid rgba(0,0,0,0.06);
    border-radius:14px;
    padding:16px;
    margin-top:12px;
    text-align:center;
  }
  .settings-panel label{
    display:block;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:10px;
    line-height:1.5;
  }
  .settings-panel input{
    width:80px;
    font-size:15px;
    font-family:'JetBrains Mono', monospace;
    text-align:center;
    padding:6px 8px;
    border-radius:8px;
    border:1px solid rgba(0,0,0,0.15);
    margin-right:10px;
  }
  .settings-panel button{
    border:none;
    background:var(--indigo);
    color:var(--white);
    padding:7px 16px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
  }
  .settings-hint{
    font-size:11.5px;
    color:var(--ink-soft);
    opacity:.75;
    margin-top:10px;
  }

  button:focus-visible, .card:focus-visible{
    outline:3px solid var(--indigo);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .card-inner, .stamp{transition:none; animation:none;}
  }

  @media (max-width:360px){
    .kr-word{font-size:36px;}
    .meaning{font-size:20px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <p class="app-title">도장깨기</p>
    <p class="app-sub">韩语单词闪卡 · 一个词一个词，慢慢盖满章</p>
  </div>

  <div class="session-bar">
    <span id="sessionLabel">오늘 복습 · 0 / 0</span>
    <span id="totalLabel">0 단어</span>
  </div>
  <div class="stats-bar" id="statsBar">
    <span class="seg-0" style="flex-basis:100%"></span>
  </div>

  <div class="banner" id="banner" style="display:none;"></div>

  <div class="card-wrap">
    <div class="card" id="card" tabindex="0" role="button" aria-label="点击翻卡片查看释义">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="level-badge" id="levelBadgeFront"></div>
          <p class="kr-word" id="krWord"></p>
          <p class="romanization" id="romanization"></p>
          <button class="speak-btn" id="speakBtnFront">🔊 발음 듣기</button>
          <span class="flip-hint" id="flipHint">탭해서 뜻 보기 · 点击查看释义</span>
        </div>
        <div class="card-face card-back">
          <div class="level-badge" id="levelBadgeBack"></div>
          <button class="speak-btn" id="speakBtnBack" style="margin-bottom:14px;">🔊 발음 듣기</button>
          <p class="meaning" id="meaning"></p>
          <div class="example-block">
            <div class="example-kr-row">
              <p class="example-kr" id="exampleKr"></p>
              <button class="example-speak-btn" id="speakBtnExample" aria-label="예문 발음 듣기 · 播放例句发音">🔊</button>
            </div>
            <p class="example-zh" id="exampleZh"></p>
          </div>
        </div>
        <div class="stamp-layer" id="stampLayer"></div>
      </div>
    </div>
  </div>

  <div class="ratings">
    <button class="rate-btn r0" id="rate0" disabled>
      <span class="kr">모르겠어요</span><span class="zh">完全不会</span>
    </button>
    <button class="rate-btn r1" id="rate1" disabled>
      <span class="kr">조금 알아요</span><span class="zh">有点印象</span>
    </button>
    <button class="rate-btn r2" id="rate2" disabled>
      <span class="kr">거의 알아요</span><span class="zh">比较熟悉</span>
    </button>
    <button class="rate-btn r3" id="rate3" disabled>
      <span class="kr">완벽해요</span><span class="zh">完全掌握</span>
    </button>
  </div>

  <div class="footer-row">
    <button class="reset-link" id="settingsToggleBtn">学习设置</button>
    <button class="reset-link" id="resetBtn">重置学习进度</button>
  </div>

  <div class="settings-panel" id="settingsPanel" style="display:none;">
    <label for="dailyLimitInput">매일 새 단어 최대 개수 · 每天最多学习几个新词</label>
    <input type="number" id="dailyLimitInput" min="1" max="200" step="1">
    <button id="saveSettingsBtn">저장 · 保存</button>
    <p class="settings-hint" id="settingsHint"></p>
  </div>
</div>

<script>
let VOCAB = [];

const LEVELS = [
  {label:"모르겠어요", zh:"完全不会", color:"var(--neutral)", stampChar:"未", intervalMs:0},
  {label:"조금 알아요", zh:"有点印象", color:"var(--ochre)", stampChar:"初", intervalMs:24*60*60*1000},
  {label:"거의 알아요", zh:"比较熟悉", color:"var(--indigo)", stampChar:"熟", intervalMs:3*24*60*60*1000},
  {label:"완벽해요", zh:"完全掌握", color:"var(--seal)", stampChar:"通", intervalMs:7*24*60*60*1000}
];

const STORAGE_KEY = "korean-flashcards-progress-unit1";
const SETTINGS_KEY = "korean-flashcards-settings-unit1";
const NEWCOUNT_KEY = "korean-flashcards-newcount-unit1";
const DEFAULT_DAILY_NEW_LIMIT = 12;

let progress = {};
let settings = { dailyNewLimit: DEFAULT_DAILY_NEW_LIMIT };
let newWordsToday = 0;
let queue = [];
let currentIndex = 0;
let sessionTotal = 0;
let sessionDone = 0;
let isFlipped = false;

const el = id => document.getElementById(id);

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getState(word){
  return progress[word] || {level:0, dueAt:0, reviews:0};
}

function todayKey(){
  return new Date().toDateString();
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    progress = raw ? JSON.parse(raw) : {};
  }catch(e){
    progress = {};
  }
}

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){
    // localStorage unavailable (e.g. private browsing); continue with in-memory progress only
  }
}

function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    const s = raw ? JSON.parse(raw) : {};
    settings.dailyNewLimit = (typeof s.dailyNewLimit === "number" && s.dailyNewLimit > 0) ? s.dailyNewLimit : DEFAULT_DAILY_NEW_LIMIT;
  }catch(e){
    settings.dailyNewLimit = DEFAULT_DAILY_NEW_LIMIT;
  }
}

function saveSettings(){
  try{
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }catch(e){}
}

function loadNewCount(){
  try{
    const raw = localStorage.getItem(NEWCOUNT_KEY);
    const data = raw ? JSON.parse(raw) : null;
    newWordsToday = (data && data.date === todayKey()) ? data.count : 0;
  }catch(e){
    newWordsToday = 0;
  }
}

function saveNewCount(){
  try{
    localStorage.setItem(NEWCOUNT_KEY, JSON.stringify({date: todayKey(), count: newWordsToday}));
  }catch(e){}
}

function buildQueue(){
  const now = Date.now();
  const reviewDue = VOCAB.filter(v => {
    const st = getState(v.k);
    return st.reviews > 0 && st.dueAt <= now;
  });
  const newWords = VOCAB.filter(v => getState(v.k).reviews === 0);

  let selected;
  let freePractice = false;
  let quotaReached = false;

  if(reviewDue.length === 0 && newWords.length === 0){
    selected = [...VOCAB];
    freePractice = true;
  }else{
    const remainingSlots = Math.max(0, settings.dailyNewLimit - newWordsToday);
    const allowedNew = newWords.slice(0, remainingSlots);
    selected = [...reviewDue, ...allowedNew];
    quotaReached = allowedNew.length < newWords.length && reviewDue.length === 0 && selected.length === 0;
  }

  queue = shuffle(selected);
  currentIndex = 0;
  sessionTotal = queue.length;
  sessionDone = 0;

  const banner = el("banner");
  if(freePractice){
    banner.style.display = "block";
    banner.textContent = "오늘 예정된 복습이 없어요 · 今天没有到期复习的词，来自由练习一轮吧（全部单词打乱重新出现）";
  }else if(quotaReached){
    banner.style.display = "block";
    banner.textContent = "오늘의 새 단어 학습량을 다 채웠어요 · 今天的新词学习额度已用完，明天再来学新词吧（设置里可以调整数量）";
  }else{
    banner.style.display = "none";
  }
}

function updateStatsBar(){
  const counts = [0,0,0,0];
  VOCAB.forEach(v => counts[getState(v.k).level]++);
  const bar = el("statsBar");
  bar.innerHTML = "";
  counts.forEach((c,i)=>{
    if(c<=0) return;
    const span = document.createElement("span");
    span.className = "seg-"+i;
    span.style.flexBasis = (c/VOCAB.length*100)+"%";
    bar.appendChild(span);
  });
  if(counts.every(c=>c===0)){
    bar.innerHTML = '<span class="seg-0" style="flex-basis:100%"></span>';
  }
}

function renderLevelBadge(target, level){
  const lv = LEVELS[level];
  target.style.background = level===0 ? "rgba(138,131,119,0.35)" : lv.color;
  target.style.color = level===0 ? "var(--ink-soft)" : "var(--white)";
  target.textContent = level===0 ? "" : lv.stampChar;
}

function renderCard(){
  if(queue.length === 0){
    el("krWord").textContent = "🎉";
    el("meaning").textContent = "이번 세션 완료! 本轮学习完成！";
    el("romanization").textContent = "";
    el("exampleKr").textContent = "";
    el("exampleZh").textContent = "";
    [0,1,2,3].forEach(i => el("rate"+i).disabled = true);
    el("sessionLabel").textContent = "오늘 복습 · "+sessionDone+" / "+sessionTotal;
    return;
  }
  const item = queue[currentIndex];
  const state = getState(item.k);
  isFlipped = false;
  el("card").classList.remove("flipped");
  el("krWord").textContent = item.k;
  el("romanization").textContent = "["+item.r+"]";
  el("meaning").textContent = item.m;
  el("exampleKr").textContent = item.e;
  el("exampleZh").textContent = item.t;
  renderLevelBadge(el("levelBadgeFront"), state.level);
  renderLevelBadge(el("levelBadgeBack"), state.level);
  el("flipHint").style.display = "block";
  [0,1,2,3].forEach(i => el("rate"+i).disabled = true);
  el("sessionLabel").textContent = "오늘 복습 · "+sessionDone+" / "+sessionTotal;
}

function flipCard(){
  if(queue.length === 0) return;
  isFlipped = !isFlipped;
  el("card").classList.toggle("flipped", isFlipped);
  if(isFlipped){
    [0,1,2,3].forEach(i => el("rate"+i).disabled = false);
  }
}

function speak(text){
  if(!("speechSynthesis" in window) || !text) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR";
    u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}

function showStamp(levelIdx){
  const layer = el("stampLayer");
  const lv = LEVELS[levelIdx];
  const stamp = document.createElement("div");
  stamp.className = "stamp";
  stamp.style.color = levelIdx===0 ? "var(--neutral)" : lv.color;
  stamp.textContent = lv.stampChar;
  layer.innerHTML = "";
  layer.appendChild(stamp);
  setTimeout(()=>{ layer.innerHTML = ""; }, 700);
}

function rate(levelIdx){
  if(queue.length === 0) return;
  const item = queue[currentIndex];
  const prevState = getState(item.k);
  const wasNew = prevState.reviews === 0;
  const lv = LEVELS[levelIdx];
  progress[item.k] = {
    level: levelIdx,
    dueAt: Date.now() + lv.intervalMs,
    reviews: (prevState.reviews||0) + 1
  };
  saveProgress();
  if(wasNew){
    newWordsToday++;
    saveNewCount();
  }
  showStamp(levelIdx);
  updateStatsBar();
  sessionDone++;
  setTimeout(()=>{
    currentIndex++;
    if(currentIndex >= queue.length){
      queue = [];
    }
    renderCard();
  }, 650);
}

function resetProgress(){
  if(!confirm("정말 초기화할까요? · 确定要清空所有学习进度吗？此操作无法撤销。")) return;
  progress = {};
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  buildQueue();
  updateStatsBar();
  renderCard();
}

function renderSettingsUI(){
  el("dailyLimitInput").value = settings.dailyNewLimit;
  el("settingsHint").textContent = "오늘 이미 "+newWordsToday+"개의 새 단어를 학습했어요 · 今天已经学了 "+newWordsToday+" 个新词";
}

function toggleSettingsPanel(){
  const panel = el("settingsPanel");
  const showing = panel.style.display !== "none";
  panel.style.display = showing ? "none" : "block";
  if(!showing) renderSettingsUI();
}

function saveSettingsFromUI(){
  const val = parseInt(el("dailyLimitInput").value, 10);
  settings.dailyNewLimit = (Number.isFinite(val) && val > 0) ? val : DEFAULT_DAILY_NEW_LIMIT;
  saveSettings();
  buildQueue();
  updateStatsBar();
  renderCard();
  renderSettingsUI();
}

el("card").addEventListener("click", flipCard);
el("card").addEventListener("keydown", (e)=>{
  if(e.key==="Enter" || e.key===" "){ e.preventDefault(); flipCard(); }
});
el("speakBtnFront").addEventListener("click", (e)=>{ e.stopPropagation(); speak(queue[currentIndex]?.k || ""); });
el("speakBtnBack").addEventListener("click", (e)=>{ e.stopPropagation(); speak(queue[currentIndex]?.k || ""); });
el("speakBtnExample").addEventListener("click", (e)=>{ e.stopPropagation(); speak(queue[currentIndex]?.e || ""); });
el("rate0").addEventListener("click", ()=>rate(0));
el("rate1").addEventListener("click", ()=>rate(1));
el("rate2").addEventListener("click", ()=>rate(2));
el("rate3").addEventListener("click", ()=>rate(3));
el("resetBtn").addEventListener("click", resetProgress);
el("settingsToggleBtn").addEventListener("click", toggleSettingsPanel);
el("saveSettingsBtn").addEventListener("click", saveSettingsFromUI);

(async function init(){
  try{
    const res = await fetch("vocab.json");
    VOCAB = await res.json();
  }catch(e){
    el("krWord").textContent = "⚠️";
    el("meaning").textContent = "단어 데이터를 불러오지 못했어요 · 词汇数据加载失败，请确认 vocab.json 与 index.html 在同一目录下并通过网页服务器访问";
    return;
  }
  el("totalLabel").textContent = VOCAB.length + " 단어";
  loadSettings();
  loadNewCount();
  loadProgress();
  buildQueue();
  updateStatsBar();
  renderCard();
  renderSettingsUI();
})();
</script>
</body>
</html>
