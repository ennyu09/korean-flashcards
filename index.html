<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盖章背单词 · 韩语单词闪卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF2ED;
    --paper-2:#E1E8E1;
    --ink:#232323;
    --ink-soft:#5c574f;
    --indigo:#2F4468;
    --ochre:#C08A2E;
    --ochre-dark:#8a5c17;
    --seal:#B23A2E;
    --seal-dark:#8f2a20;
    --neutral:#8a8377;
    --neutral-dark:#4a4038;
    --white:#fffdf8;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(47,68,104,0.06), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(178,58,46,0.05), transparent 40%),
      var(--paper);
    font-family:'Noto Sans SC', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px 14px 40px;
  }
  .app{
    width:100%;
    max-width:420px;
    position:relative;
  }

  /* header */
  .app-header{
    text-align:center;
    margin-bottom:18px;
  }

  .hamburger-btn{
    position:absolute;
    top:2px;
    left:0;
    width:34px;
    height:34px;
    border:1px solid rgba(0,0,0,0.08);
    background:var(--white);
    border-radius:9px;
    font-size:15px;
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 4px rgba(35,30,20,0.04);
  }

  .sidebar-backdrop{
    position:fixed;
    inset:0;
    background:rgba(20,18,15,0.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    z-index:90;
  }
  .sidebar-backdrop.open{opacity:1; pointer-events:auto;}

  .sidebar{
    position:fixed;
    top:0;
    left:0;
    height:100%;
    width:82%;
    max-width:300px;
    background:var(--paper);
    box-shadow:2px 0 24px rgba(0,0,0,0.18);
    transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.3,.9,.4,1);
    z-index:100;
    padding:22px 16px;
    overflow-y:auto;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
  }
  .sidebar-title{
    font-family:'Song Myung', serif;
    font-size:16px;
    color:var(--ink);
    margin:0;
  }
  .sidebar-close{
    border:none;
    background:none;
    font-size:18px;
    color:var(--ink-soft);
    cursor:pointer;
    padding:4px;
  }
  .sidebar-eyebrow{
    font-size:11.5px;
    color:var(--ink-soft);
    margin:0 0 14px;
  }
  .sidebar-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .sidebar-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--white);
    border:1px solid rgba(0,0,0,0.06);
    border-radius:10px;
    padding:10px 12px;
    cursor:pointer;
    font-family:'Noto Sans SC', sans-serif;
    font-size:13.5px;
    color:var(--ink);
    text-align:left;
  }
  .sidebar-item:disabled{cursor:default; opacity:.4;}
  .sidebar-item.active{
    border-color:var(--indigo);
    background:rgba(47,68,104,0.07);
  }
  .sidebar-item .count{
    font-size:11px;
    color:var(--ink-soft);
    white-space:nowrap;
    margin-left:8px;
  }

  .app-footer{
    margin-top:26px;
    text-align:center;
    font-size:10.5px;
    color:var(--ink-soft);
    opacity:.65;
    line-height:1.6;
    padding:0 8px;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:28px;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--white);
    padding:10px 18px;
    border-radius:999px;
    font-size:12.5px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:200;
    max-width:85%;
    text-align:center;
    line-height:1.5;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .app-title{
    font-family:'Song Myung', serif;
    font-size:26px;
    letter-spacing:1px;
    color:var(--ink);
    margin:0;
  }
  .app-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:4px 0 0;
    letter-spacing:.2px;
  }

  /* menu / unit list */
  .menu-eyebrow{
    font-size:13px;
    color:var(--ink-soft);
    text-align:center;
    margin:0 0 16px;
    letter-spacing:.3px;
  }
  .unit-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .unit-tile{
    background:var(--white);
    border:1px solid rgba(0,0,0,0.06);
    border-radius:14px;
    padding:14px;
    text-align:left;
    cursor:pointer;
    font-family:'Noto Sans SC', sans-serif;
    box-shadow:0 2px 4px rgba(35,30,20,0.04);
  }
  .unit-tile:disabled{
    cursor:default;
    opacity:.4;
  }
  .unit-tile .unit-name{
    display:block;
    font-family:'Song Myung', serif;
    font-size:17px;
    color:var(--ink);
    margin:0 0 4px;
  }
  .unit-tile .unit-count{
    display:block;
    font-size:11.5px;
    color:var(--ink-soft);
    margin:0 0 10px;
  }
  .unit-tile .unit-bar{
    display:flex;
    height:5px;
    width:100%;
    border-radius:4px;
    overflow:hidden;
    background:var(--paper-2);
  }
  .unit-tile .unit-bar span{height:100%;}

  .back-link{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12.5px;
    cursor:pointer;
    padding:6px 0;
    margin-bottom:10px;
    text-decoration:underline;
  }
  .current-unit-label{
    font-family:'Song Myung', serif;
    font-size:15px;
    color:var(--ink);
    text-align:center;
    margin:0 0 4px;
  }

  /* session bar */
  .session-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12.5px;
    color:var(--ink-soft);
    margin:10px 2px 6px;
    font-family:'JetBrains Mono', monospace;
  }
  .stats-bar{
    display:flex;
    height:8px;
    width:100%;
    border-radius:5px;
    overflow:hidden;
    background:var(--paper-2);
    margin-bottom:22px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);
  }
  .stats-bar span{height:100%;transition:flex-basis .4s ease;}
  .seg-0{background:var(--neutral);}
  .seg-1{background:var(--ochre);}
  .seg-2{background:var(--indigo);}
  .seg-3{background:var(--seal);}

  .banner{
    background:var(--white);
    border:1px solid rgba(0,0,0,0.06);
    border-radius:14px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    text-align:center;
    margin-bottom:16px;
    line-height:1.5;
  }

  /* card */
  .card-wrap{
    perspective:1400px;
    margin-bottom:8px;
  }
  .card{
    position:relative;
    width:100%;
    aspect-ratio:3/4;
    cursor:pointer;
  }
  .card-inner{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.34,1.1,.64,1);
  }
  .card.flipped .card-inner{transform:rotateY(180deg);}
  .card-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:var(--radius);
    background:var(--white);
    box-shadow:0 2px 4px rgba(35,30,20,0.04), 0 12px 30px rgba(35,30,20,0.10);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 22px;
    text-align:center;
  }
  .card-back{transform:rotateY(180deg);}

  .level-badge{
    position:absolute;
    top:14px;
    right:14px;
    width:30px;
    height:30px;
    border-radius:48% 52% 47% 53%/53% 47% 53% 47%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Song Myung', serif;
    font-size:15px;
    color:var(--white);
    opacity:.9;
  }

  .kr-word{
    font-family:'Song Myung', serif;
    font-size:46px;
    line-height:1.25;
    color:var(--ink);
    margin:0 0 10px;
    word-break:keep-all;
  }
  .romanization{
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    color:var(--ink-soft);
    letter-spacing:.3px;
    margin-bottom:14px;
  }
  .speak-btn{
    border:1px solid rgba(0,0,0,0.1);
    background:var(--paper);
    color:var(--ink-soft);
    border-radius:999px;
    padding:7px 16px;
    font-size:13px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .speak-btn:hover{background:var(--paper-2);}
  .flip-hint{
    position:absolute;
    bottom:16px;
    font-size:12px;
    color:var(--ink-soft);
    opacity:.6;
  }

  .meaning{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:26px;
    color:var(--ink);
    margin:2px 0 14px;
  }
  .example-block{
    background:var(--paper);
    border-radius:12px;
    padding:12px 14px;
    width:100%;
  }
  .example-kr-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    margin-bottom:4px;
  }
  .example-kr{
    font-size:16px;
    color:var(--ink);
    margin:0;
    line-height:1.5;
    text-align:left;
  }
  .example-speak-btn{
    flex:0 0 auto;
    border:none;
    background:none;
    color:var(--ink-soft);
    font-size:14px;
    cursor:pointer;
    padding:0 0 0 4px;
    line-height:1.5;
  }
  .example-speak-btn:hover{color:var(--ink);}
  .example-zh{
    font-size:14px;
    color:var(--ink-soft);
    margin:0;
    line-height:1.5;
    text-align:left;
  }

  /* stamp overlay */
  .stamp-layer{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    z-index:5;
    transform:rotateY(180deg);
  }
  .stamp{
    width:110px;
    height:110px;
    border-radius:46% 54% 49% 51%/52% 48% 53% 47%;
    border:4px solid currentColor;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Song Myung', serif;
    font-size:48px;
    transform:rotate(-9deg) scale(0.4);
    opacity:0;
    animation:stampIn .6s cubic-bezier(.2,1.4,.5,1) forwards;
    box-shadow:0 0 0 3px rgba(255,255,255,0.0);
  }
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-9deg) scale(2.2);}
    55%{opacity:1; transform:rotate(-9deg) scale(0.85);}
    75%{opacity:1; transform:rotate(-9deg) scale(1.05);}
    100%{opacity:1; transform:rotate(-9deg) scale(1);}
  }

  /* rating buttons */
  .ratings{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
  }
  .rate-btn{
    border:none;
    border-radius:14px;
    padding:14px 10px;
    color:var(--white);
    cursor:pointer;
    text-align:left;
    font-family:'Noto Sans SC', sans-serif;
    font-size:14.5px;
    font-weight:700;
    transition:transform .12s ease, opacity .2s ease;
  }
  .rate-btn:active{transform:scale(0.97);}
  .rate-btn:disabled{opacity:.35; cursor:not-allowed;}
  .r0{background:var(--neutral-dark);}
  .r1{background:var(--ochre-dark);}
  .r2{background:var(--indigo);}
  .r3{background:var(--seal-dark);}

  .footer-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:22px;
  }
  .reset-link{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    padding:6px;
  }

  .review-panel{
    background:var(--white);
    border:1px solid rgba(0,0,0,0.06);
    border-radius:14px;
    padding:14px;
    margin-top:12px;
  }
  .review-panel-title{
    font-family:'Song Myung', serif;
    font-size:14px;
    color:var(--ink);
    text-align:center;
    margin:0 0 4px;
  }
  .review-panel-hint{
    font-size:11px;
    color:var(--ink-soft);
    text-align:center;
    margin:0 0 10px;
    opacity:.8;
  }
  .review-table-scroll{
    max-height:320px;
    overflow-y:auto;
  }
  .review-table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
  }
  .review-table th{
    position:sticky;
    top:0;
    background:var(--white);
    text-align:left;
    font-weight:500;
    font-size:10.5px;
    color:var(--ink-soft);
    padding:5px 6px;
    border-bottom:1px solid rgba(0,0,0,0.08);
  }
  .review-table td{
    padding:6px;
    border-bottom:1px solid rgba(0,0,0,0.04);
    color:var(--ink);
  }
  .review-table td.due-now{
    color:var(--seal-dark);
    font-weight:700;
  }
  .review-table td.not-started{
    color:var(--ink-soft);
    opacity:.7;
  }

  button:focus-visible, .card:focus-visible{
    outline:3px solid var(--indigo);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .card-inner, .stamp{transition:none; animation:none;}
  }

  @media (max-width:360px){
    .kr-word{font-size:38px;}
    .meaning{font-size:22px;}
  }
</style>
</head>
<body>
<div class="app">
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="打开单元目录">☰</button>
  <div class="app-header">
    <p class="app-title">盖章背单词</p>
    <p class="app-sub">韩语单词闪卡 · 一个词一个词，慢慢盖满章</p>
  </div>

  <div id="menuView">
    <p class="menu-eyebrow">TOPIK 必背单词 · 初级</p>
    <div class="unit-grid" id="unitGrid"></div>
  </div>

  <div id="studyView" style="display:none;">
    <button class="back-link" id="backToMenuBtn">← 返回目录</button>
    <p class="current-unit-label" id="currentUnitLabel"></p>

    <div class="session-bar">
      <span id="sessionLabel">今日复习 · 0 / 0</span>
      <span id="totalLabel">0 个单词</span>
    </div>
    <div class="stats-bar" id="statsBar">
      <span class="seg-0" style="flex-basis:100%"></span>
    </div>

    <div class="banner" id="banner" style="display:none;"></div>

    <div class="card-wrap">
      <div class="card" id="card" tabindex="0" role="button" aria-label="点击翻卡片查看释义">
        <div class="card-inner" id="cardInner">
          <div class="card-face card-front">
            <div class="level-badge" id="levelBadgeFront"></div>
            <p class="kr-word" id="krWord"></p>
            <p class="romanization" id="romanization"></p>
            <button class="speak-btn" id="speakBtnFront">🔊 播放发音</button>
            <span class="flip-hint" id="flipHint">点击卡片查看释义</span>
          </div>
          <div class="card-face card-back">
            <div class="level-badge" id="levelBadgeBack"></div>
            <button class="speak-btn" id="speakBtnBack" style="margin-bottom:14px;">🔊 播放发音</button>
            <p class="meaning" id="meaning"></p>
            <div class="example-block">
              <div class="example-kr-row">
                <p class="example-kr" id="exampleKr"></p>
                <button class="example-speak-btn" id="speakBtnExample" aria-label="播放例句发音">🔊</button>
              </div>
              <p class="example-zh" id="exampleZh"></p>
            </div>
          </div>
          <div class="stamp-layer" id="stampLayer"></div>
        </div>
      </div>
    </div>

    <div class="ratings">
      <button class="rate-btn r0" id="rate0" disabled>完全不会</button>
      <button class="rate-btn r1" id="rate1" disabled>有点印象</button>
      <button class="rate-btn r2" id="rate2" disabled>比较熟悉</button>
      <button class="rate-btn r3" id="rate3" disabled>完全掌握</button>
    </div>

    <div class="footer-row">
      <button class="reset-link" id="reviewLogToggleBtn">复习记录</button>
      <button class="reset-link" id="resetBtn">重置本单元进度</button>
    </div>

    <div class="review-panel" id="reviewPanel" style="display:none;">
      <p class="review-panel-title">艾宾浩斯复习记录</p>
      <p class="review-panel-hint" id="reviewPanelHint"></p>
      <div class="review-table-scroll">
        <table class="review-table">
          <thead>
            <tr><th>单词</th><th>阶段</th><th>下次复习</th></tr>
          </thead>
          <tbody id="reviewTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <p class="app-footer">词汇选自《金龙一 TOPIK必备单词》，释义为学习整理内容；例句与例句翻译由 AI 生成，仅供个人学习参考，非商业用途。</p>

  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <p class="sidebar-title">单元目录</p>
      <button class="sidebar-close" id="sidebarCloseBtn" aria-label="关闭目录">✕</button>
    </div>
    <p class="sidebar-eyebrow">TOPIK 必背单词 · 初级</p>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
let UNITS = [];
let currentUnit = null;

const LEVELS = [
  {label:"完全不会", color:"var(--neutral)", stampChar:"未"},
  {label:"有点印象", color:"var(--ochre)", stampChar:"初"},
  {label:"比较熟悉", color:"var(--indigo)", stampChar:"熟"},
  {label:"完全掌握", color:"var(--seal)", stampChar:"通"}
];

// 艾宾浩斯记忆曲线经典复习间隔：5分钟、30分钟、12小时、1天、2天、4天、7天、15天、1个月
const STEPS = [
  5*60*1000,
  30*60*1000,
  12*60*60*1000,
  1*24*60*60*1000,
  2*24*60*60*1000,
  4*24*60*60*1000,
  7*24*60*60*1000,
  15*24*60*60*1000,
  30*24*60*60*1000
];

const STORAGE_KEY = "korean-flashcards-progress-v2";
const NEWCOUNT_KEY = "korean-flashcards-newcount-v2";
const DAILY_NEW_LIMIT = 12; // 每天最多学几个新词，所有单元共用，避免到期词一次性全冒出来

let progress = {};
let newWordsToday = 0;
let queue = [];
let currentIndex = 0;
let sessionTotal = 0;
let sessionDone = 0;
let isFlipped = false;

const el = id => document.getElementById(id);

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function stateKey(unitId, word){
  return unitId + "::" + word;
}

function getUnitState(unitId, word){
  return progress[stateKey(unitId, word)] || {level:0, dueAt:0, reviews:0, step:0};
}

function getState(word){
  return getUnitState(currentUnit.id, word);
}

function todayKey(){
  return new Date().toDateString();
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    progress = raw ? JSON.parse(raw) : {};
  }catch(e){
    progress = {};
  }
}

function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){
    // localStorage unavailable (e.g. private browsing); continue with in-memory progress only
  }
}

function loadNewCount(){
  try{
    const raw = localStorage.getItem(NEWCOUNT_KEY);
    const data = raw ? JSON.parse(raw) : null;
    newWordsToday = (data && data.date === todayKey()) ? data.count : 0;
  }catch(e){
    newWordsToday = 0;
  }
}

function saveNewCount(){
  try{
    localStorage.setItem(NEWCOUNT_KEY, JSON.stringify({date: todayKey(), count: newWordsToday}));
  }catch(e){}
}

function unitCounts(unit){
  const counts = [0,0,0,0];
  unit.words.forEach(v => counts[getUnitState(unit.id, v.k).level]++);
  return counts;
}

function renderMenu(){
  const grid = el("unitGrid");
  grid.innerHTML = "";
  UNITS.forEach(unit => {
    const btn = document.createElement("button");
    const hasWords = unit.words.length > 0;
    btn.className = "unit-tile";
    btn.disabled = !hasWords;
    if(hasWords){
      const counts = unitCounts(unit);
      const barSegs = counts.map((c,i)=>{
        if(c<=0) return "";
        return '<span class="seg-'+i+'" style="flex-basis:'+(c/unit.words.length*100)+'%"></span>';
      }).join("");
      btn.innerHTML =
        '<span class="unit-name">'+unit.title+'</span>' +
        '<span class="unit-count">'+unit.words.length+' 个单词</span>' +
        '<span class="unit-bar">'+(barSegs || '<span class="seg-0" style="flex-basis:100%"></span>')+'</span>';
      btn.addEventListener("click", ()=>openUnit(unit.id));
    }else{
      btn.innerHTML =
        '<span class="unit-name">'+unit.title+'</span>' +
        '<span class="unit-count">暂无内容</span>' +
        '<span class="unit-bar"><span class="seg-0" style="flex-basis:100%"></span></span>';
    }
    grid.appendChild(btn);
  });
}

function openUnit(unitId){
  currentUnit = UNITS.find(u => u.id === unitId);
  if(!currentUnit || currentUnit.words.length === 0) return;
  el("menuView").style.display = "none";
  el("studyView").style.display = "block";
  el("currentUnitLabel").textContent = currentUnit.title;
  el("totalLabel").textContent = currentUnit.words.length + " 个单词";
  loadNewCount();
  buildQueue();
  updateStatsBar();
  renderCard();
  el("reviewPanel").style.display = "none";
}

function backToMenu(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  el("studyView").style.display = "none";
  el("menuView").style.display = "block";
  currentUnit = null;
  renderMenu();
}

function renderSidebar(){
  const list = el("sidebarList");
  list.innerHTML = "";
  UNITS.forEach(unit => {
    const hasWords = unit.words.length > 0;
    const btn = document.createElement("button");
    btn.className = "sidebar-item" + (currentUnit && currentUnit.id === unit.id ? " active" : "");
    btn.disabled = !hasWords;
    const countText = hasWords ? unit.words.length + " 词" : "暂无内容";
    btn.innerHTML = "<span>"+unit.title+"</span><span class=\"count\">"+countText+"</span>";
    if(hasWords){
      btn.addEventListener("click", ()=>{ openUnit(unit.id); closeSidebar(); });
    }
    list.appendChild(btn);
  });
}

function openSidebar(){
  renderSidebar();
  el("sidebar").classList.add("open");
  el("sidebarBackdrop").classList.add("open");
}

function closeSidebar(){
  el("sidebar").classList.remove("open");
  el("sidebarBackdrop").classList.remove("open");
}

function buildQueue(){
  const now = Date.now();
  const words = currentUnit.words;
  const reviewDue = words.filter(v => {
    const st = getState(v.k);
    return st.reviews > 0 && st.dueAt <= now;
  });
  const newWords = words.filter(v => getState(v.k).reviews === 0);

  let selected;
  let freePractice = false;
  let quotaReached = false;

  if(reviewDue.length === 0 && newWords.length === 0){
    selected = [...words];
    freePractice = true;
  }else{
    const remainingSlots = Math.max(0, DAILY_NEW_LIMIT - newWordsToday);
    const allowedNew = newWords.slice(0, remainingSlots);
    selected = [...reviewDue, ...allowedNew];
    quotaReached = allowedNew.length < newWords.length && reviewDue.length === 0 && selected.length === 0;
  }

  queue = shuffle(selected);
  currentIndex = 0;
  sessionTotal = queue.length;
  sessionDone = 0;

  const banner = el("banner");
  if(freePractice){
    banner.style.display = "block";
    banner.textContent = "今天这个单元没有到期复习的词，来自由练习一轮吧（全部单词打乱重新出现）";
  }else if(quotaReached){
    banner.style.display = "block";
    banner.textContent = "今天的新词学习额度已用完，明天再来学新词吧（可以点下面的「复习记录」看看安排）";
  }else{
    banner.style.display = "none";
  }
}

function updateStatsBar(){
  const counts = unitCounts(currentUnit);
  const bar = el("statsBar");
  bar.innerHTML = "";
  counts.forEach((c,i)=>{
    if(c<=0) return;
    const span = document.createElement("span");
    span.className = "seg-"+i;
    span.style.flexBasis = (c/currentUnit.words.length*100)+"%";
    bar.appendChild(span);
  });
  if(counts.every(c=>c===0)){
    bar.innerHTML = '<span class="seg-0" style="flex-basis:100%"></span>';
  }
}

function renderLevelBadge(target, level){
  const lv = LEVELS[level];
  target.style.background = level===0 ? "rgba(138,131,119,0.35)" : lv.color;
  target.style.color = level===0 ? "var(--ink-soft)" : "var(--white)";
  target.textContent = level===0 ? "" : lv.stampChar;
}

function renderCard(){
  if(queue.length === 0){
    el("krWord").textContent = "🎉";
    el("meaning").textContent = "本轮学习完成！";
    el("romanization").textContent = "";
    el("exampleKr").textContent = "";
    el("exampleZh").textContent = "";
    [0,1,2,3].forEach(i => el("rate"+i).disabled = true);
    el("sessionLabel").textContent = "今日复习 · "+sessionDone+" / "+sessionTotal;
    return;
  }
  const item = queue[currentIndex];
  const state = getState(item.k);
  isFlipped = false;
  el("card").classList.remove("flipped");
  el("krWord").textContent = item.k;
  el("romanization").textContent = "["+item.r+"]";
  el("meaning").textContent = item.m;
  el("exampleKr").textContent = item.e;
  el("exampleZh").textContent = item.t;
  renderLevelBadge(el("levelBadgeFront"), state.level);
  renderLevelBadge(el("levelBadgeBack"), state.level);
  el("flipHint").style.display = "block";
  [0,1,2,3].forEach(i => el("rate"+i).disabled = true);
  el("sessionLabel").textContent = "今日复习 · "+sessionDone+" / "+sessionTotal;
}

function flipCard(){
  if(queue.length === 0) return;
  isFlipped = !isFlipped;
  el("card").classList.toggle("flipped", isFlipped);
  if(isFlipped){
    [0,1,2,3].forEach(i => el("rate"+i).disabled = false);
  }
}

let toastTimer = null;
function showToast(msg){
  const t = el("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.classList.remove("show"); }, 3500);
}

function speak(text){
  if(!text) return;
  if(!("speechSynthesis" in window)){
    showToast("这个浏览器不支持语音朗读，换个浏览器试试");
    return;
  }
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR";
    u.rate = 0.9;
    u.onerror = function(){
      showToast("朗读失败，这个设备可能没装韩语语音包，建议用手机自带浏览器（Safari / Chrome）直接打开网页试试");
    };
    speechSynthesis.speak(u);
  }catch(e){
    showToast("这个设备暂时无法朗读语音");
  }
}

function showStamp(levelIdx){
  const layer = el("stampLayer");
  const lv = LEVELS[levelIdx];
  const stamp = document.createElement("div");
  stamp.className = "stamp";
  stamp.style.color = levelIdx===0 ? "var(--neutral)" : lv.color;
  stamp.textContent = lv.stampChar;
  layer.innerHTML = "";
  layer.appendChild(stamp);
  setTimeout(()=>{ layer.innerHTML = ""; }, 700);
}

function nextStep(prevStep, levelIdx){
  if(levelIdx === 0) return 0;                         // 完全不会 → 打回5分钟重新开始
  if(levelIdx === 1) return Math.max(prevStep, 1);      // 有点印象 → 停在当前步，不后退也不前进
  if(levelIdx === 2) return prevStep + 1;               // 比较熟悉 → 正常前进一步
  return prevStep + 2;                                  // 完全掌握 → 多跳一步
}

function rate(levelIdx){
  if(queue.length === 0) return;
  const item = queue[currentIndex];
  const prevState = getState(item.k);
  const wasNew = prevState.reviews === 0;
  const step = Math.min(nextStep(prevState.step||0, levelIdx), STEPS.length - 1);
  progress[stateKey(currentUnit.id, item.k)] = {
    level: levelIdx,
    dueAt: Date.now() + STEPS[step],
    reviews: (prevState.reviews||0) + 1,
    step: step
  };
  saveProgress();
  if(wasNew){
    newWordsToday++;
    saveNewCount();
  }
  showStamp(levelIdx);
  updateStatsBar();
  if(el("reviewPanel").style.display !== "none") renderReviewLog();
  sessionDone++;
  setTimeout(()=>{
    currentIndex++;
    if(currentIndex >= queue.length){
      queue = [];
    }
    renderCard();
  }, 650);
}

function resetProgress(){
  if(!confirm("确定要清空「"+currentUnit.title+"」的学习进度吗？此操作无法撤销。")) return;
  currentUnit.words.forEach(v => {
    delete progress[stateKey(currentUnit.id, v.k)];
  });
  saveProgress();
  buildQueue();
  updateStatsBar();
  renderCard();
  if(el("reviewPanel").style.display !== "none") renderReviewLog();
}

function formatRelative(ms){
  if(ms <= 0) return "现在可复习";
  const min = Math.round(ms/60000);
  if(min < 60) return min+"分钟后";
  const hr = Math.round(ms/3600000);
  if(hr < 24) return hr+"小时后";
  const day = Math.round(ms/86400000);
  return day+"天后";
}

function renderReviewLog(){
  const now = Date.now();
  el("reviewPanelHint").textContent = "今天已学 "+newWordsToday+" 个新词（每天最多 "+DAILY_NEW_LIMIT+" 个，所有单元共用）";
  const rows = currentUnit.words.map(v => ({k: v.k, state: getState(v.k)}));
  rows.sort((a,b)=>{
    const aStarted = a.state.reviews > 0;
    const bStarted = b.state.reviews > 0;
    if(aStarted !== bStarted) return aStarted ? -1 : 1;
    if(!aStarted) return 0;
    return a.state.dueAt - b.state.dueAt;
  });
  const body = el("reviewTableBody");
  body.innerHTML = "";
  rows.forEach(row => {
    const started = row.state.reviews > 0;
    const due = started && row.state.dueAt <= now;
    const tr = document.createElement("tr");
    const kTd = document.createElement("td");
    kTd.textContent = row.k;
    const stageTd = document.createElement("td");
    stageTd.textContent = started ? LEVELS[row.state.level].label : "未学习";
    const dueTd = document.createElement("td");
    dueTd.textContent = !started ? "—" : formatRelative(row.state.dueAt - now);
    if(due) dueTd.className = "due-now";
    else if(!started) dueTd.className = "not-started";
    tr.appendChild(kTd);
    tr.appendChild(stageTd);
    tr.appendChild(dueTd);
    body.appendChild(tr);
  });
}

function toggleReviewLog(){
  const panel = el("reviewPanel");
  const showing = panel.style.display !== "none";
  panel.style.display = showing ? "none" : "block";
  if(!showing) renderReviewLog();
}

el("card").addEventListener("click", flipCard);
el("card").addEventListener("keydown", (e)=>{
  if(e.key==="Enter" || e.key===" "){ e.preventDefault(); flipCard(); }
});
el("speakBtnFront").addEventListener("click", (e)=>{ e.stopPropagation(); speak(queue[currentIndex]?.k || ""); });
el("speakBtnBack").addEventListener("click", (e)=>{ e.stopPropagation(); speak(queue[currentIndex]?.k || ""); });
el("speakBtnExample").addEventListener("click", (e)=>{ e.stopPropagation(); speak(queue[currentIndex]?.e || ""); });
el("rate0").addEventListener("click", ()=>rate(0));
el("rate1").addEventListener("click", ()=>rate(1));
el("rate2").addEventListener("click", ()=>rate(2));
el("rate3").addEventListener("click", ()=>rate(3));
el("resetBtn").addEventListener("click", resetProgress);
el("reviewLogToggleBtn").addEventListener("click", toggleReviewLog);
el("backToMenuBtn").addEventListener("click", backToMenu);
el("hamburgerBtn").addEventListener("click", openSidebar);
el("sidebarCloseBtn").addEventListener("click", closeSidebar);
el("sidebarBackdrop").addEventListener("click", closeSidebar);
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape") closeSidebar();
});

(async function init(){
  try{
    const res = await fetch("vocab.json");
    UNITS = await res.json();
  }catch(e){
    el("menuView").innerHTML = '<p style="text-align:center;color:var(--ink-soft);font-size:13px;">词汇数据加载失败，请确认 vocab.json 与 index.html 在同一目录下，并通过网页服务器（而不是直接双击文件）访问。</p>';
    return;
  }
  loadProgress();
  renderMenu();
})();
</script>
</body>
